<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub - Regarder des vidéos ensemble</title>
    <!-- Import d'une police moderne et d'icônes sympas -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c1b 0%, #05050d 100%);
            --card-bg: rgba(20, 20, 35, 0.65);
            --accent-primary: #8a2be2;
            --accent-secondary: #4a00e0;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --glow: 0 0 20px rgba(138, 43, 226, 0.4);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 950px;
        }

        /* En-tête stylé */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            background: linear-gradient(45deg, #ff007f, #8a2be2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(138, 43, 226, 0.2);
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin: 0;
        }

        /* Grille pour les contrôles du salon */
        .grid-setup {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .grid-setup { grid-template-columns: 1fr; }
        }

        /* Cartes au look "Glassmorphism" (verre dépoli) */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            border-color: rgba(138, 43, 226, 0.3);
        }

        .card h3 {
            margin: 0 0 15px 0;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
        }

        .card h3 i {
            color: #ff007f;
        }

        /* Champs de saisie */
        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.2);
        }

        /* Boutons au look moderne et dynamique */
        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-block {
            width: 100%;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: none;
        }

        /* Section Lecteur Vidéo principal */
        .theater-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.5);
        }

        .url-bar {
            margin-bottom: 20px;
        }

        .video-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        video {
            width: 100%;
            display: block;
            outline: none;
            aspect-ratio: 16 / 9;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header>
            <h1>StreamHub</h1>
            <p>Vos salons de streaming privés, parfaitement synchronisés.</p>
        </header>
        
        <!-- Blocs d'installation et de connexion -->
        <div class="grid-setup">
            <!-- Création -->
            <div class="card">
                <h3><i class="fa-solid fa-wand-magic-sparkles"></i> Lancer une session</h3>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin: 0 0 20px 0;">Créez instantanément un salon vidéo privé et invitez vos amis à vous rejoindre.</p>
                <button id="create-room-btn" class="btn-block">
                    <i class="fa-solid fa-plus"></i> Créer un salon privé
                </button>
            </div>

            <!-- Rejoindre -->
            <div class="card">
                <h3><i class="fa-solid fa-right-to-bracket"></i> Rejoindre un ami</h3>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin: 0 0 20px 0;">Insérez l'identifiant unique ou le code du salon pour synchroniser vos écrans.</p>
                <div class="input-group">
                    <input type="text" id="room-input" placeholder="ID du salon (ex: room-abcde)...">
                    <button id="join-room-btn" class="btn-secondary">Rejoindre</button>
                </div>
            </div>
        </div>

        <!-- Le Cinéma / Lecteur Vidéo principal -->
        <div class="theater-card">
            <div class="input-group url-bar">
                <input type="text" id="video-url-input" placeholder="Collez le lien direct d'une vidéo (ex: https://site.com/video.mp4)...">
                <button id="load-video-btn">
                    <i class="fa-solid fa-play-pause"></i> Sync Média
                </button>
            </div>
            
            <div class="video-wrapper">
                <video id="video-player" controls placeholder="Aucun flux chargé"></video>
            </div>
        </div>
    </div>

    <!-- Script de communication Socket.io fourni par le serveur -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        const btnCreateRoom = document.getElementById('create-room-btn');
        const roomInput = document.getElementById('room-input');
        const btnJoinRoom = document.getElementById('join-room-btn');
        const videoPlayer = document.getElementById('video-player');
        const videoUrlInput = document.getElementById('video-url-input');
        const btnLoadVideo = document.getElementById('load-video-btn');

        let currentRoomId = null;
        let isSyncing = false;

        // Récupération automatique du salon via l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const roomIdFromUrl = urlParams.get('room');

        if (roomIdFromUrl) {
            initializeRoom(roomIdFromUrl);
        }

        if (btnCreateRoom) {
            btnCreateRoom.addEventListener('click', () => {
                const randomId = 'room-' + Math.random().toString(36).substring(2, 9);
                initializeRoom(randomId);
            });
        }

        if (btnJoinRoom) {
            btnJoinRoom.addEventListener('click', () => {
                const roomId = roomInput.value.trim();
                if (roomId) initializeRoom(roomId);
            });
        }

        function initializeRoom(roomId) {
            currentRoomId = roomId;
            window.history.pushState({}, '', `?room=${roomId}`);
            socket.emit('join-room', { roomId, username: 'Utilisateur' });
            console.log(`Connecté au salon : ${roomId}`);
        }

        // --- ENVOI DES ACTIONS ---
        if (btnLoadVideo) {
            btnLoadVideo.addEventListener('click', () => {
                const url = videoUrlInput.value.trim();
                if (url && currentRoomId) {
                    videoPlayer.src = url;
                    videoPlayer.play();
                    socket.emit('change-video', { roomId: currentRoomId, videoUrl: url });
                }
            });
        }

        videoPlayer.addEventListener('play', () => {
            if (isSyncing || !currentRoomId) return;
            socket.emit('video-action', { roomId: currentRoomId, action: 'play', currentTime: videoPlayer.currentTime });
        });

        videoPlayer.addEventListener('pause', () => {
            if (isSyncing || !currentRoomId) return;
            socket.emit('video-action', { roomId: currentRoomId, action: 'pause', currentTime: videoPlayer.currentTime });
        });

        videoPlayer.addEventListener('seeked', () => {
            if (isSyncing || !currentRoomId) return;
            socket.emit('video-action', { roomId: currentRoomId, action: 'seek', currentTime: videoPlayer.currentTime });
        });

        // --- RÉCEPTION DES ÉVÉNEMENTS ---
        socket.on('user-changed-video', ({ videoUrl }) => {
            isSyncing = true;
            videoPlayer.src = videoUrl;
            videoPlayer.play();
            isSyncing = false;
        });

        socket.on('user-video-action', ({ action, currentTime }) => {
            isSyncing = true;
            videoPlayer.currentTime = currentTime;
            if (action === 'play') {
                videoPlayer.play();
            } else if (action === 'pause') {
                videoPlayer.pause();
            }
            isSyncing = false;
        });

        socket.on('sync-video', ({ videoUrl, isPlaying }) => {
            isSyncing = true;
            videoPlayer.src = videoUrl;
            if (isPlaying) {
                videoPlayer.play();
            }
            isSyncing = false;
        });
    </script>
</body>
</html>
