<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub - Regarder et Écouter Ensemble</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c1b 0%, #05050d 100%);
            --card-bg: rgba(20, 20, 35, 0.65);
            --accent-primary: #8a2be2;
            --accent-secondary: #4a00e0;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --glow: 0 0 20px rgba(138, 43, 226, 0.4);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 950px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            background: linear-gradient(45deg, #ff007f, #8a2be2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ÉCRAN D'ACCUEIL (Masqué quand connecté) */
        #auth-screen {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            #auth-screen { grid-template-columns: 1fr; }
        }

        /* INTERFACE DU SALON (Masquée au début) */
        #room-screen {
            display: none;
        }

        .room-status {
            background: rgba(138, 43, 226, 0.2);
            border: 1px solid var(--accent-primary);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 25px;
        }

        .card h3 {
            margin: 0 0 15px 0;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h3 i { color: #ff007f; }
        .card h3 i.music-icon { color: #00f2fe; }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.2);
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow);
        }

        .btn-block { width: 100%; }
        .btn-secondary { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); }

        /* MULTIMEDIA WRAPPERS */
        .media-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        video, iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Lecteur Musique Épuré */
        .audio-player-wrapper {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
        }

        audio {
            flex: 1;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>StreamHub</h1>
            <p>Salons privés synchronisés pour vidéos, streams et musique.</p>
        </header>
        
        <!-- ÉCRAN D'ACCUEIL (CREATION / REJOINDRE) -->
        <div id="auth-screen">
            <div class="card">
                <h3><i class="fa-solid fa-wand-magic-sparkles"></i> Lancer une session</h3>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;">Créez un salon vidéo privé et invitez vos amis.</p>
                <button id="create-room-btn" class="btn-block">
                    <i class="fa-solid fa-plus"></i> Créer un salon privé
                </button>
            </div>

            <div class="card">
                <h3><i class="fa-solid fa-right-to-bracket"></i> Rejoindre un ami</h3>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;">Entrez l'identifiant pour vous synchroniser.</p>
                <div class="input-group">
                    <input type="text" id="room-input" placeholder="ID du salon (ex: room-abcde)...">
                    <button id="join-room-btn" class="btn-secondary">Rejoindre</button>
                </div>
            </div>
        </div>

        <!-- ESPACE SALON ACTIF (Invisible par défaut) -->
        <div id="room-screen">
            <div class="room-status" id="room-display-id">
                Connecté au salon : Aucun
            </div>

            <!-- Lecteur Vidéo Principal (Fichiers, YouTube, Twitch) -->
            <div class="card">
                <h3><i class="fa-solid fa-play-pause"></i> Lecteur Vidéo Synchro</h3>
                <div class="input-group">
                    <input type="text" id="video-url-input" placeholder="Lien direct MP4, YouTube ou Twitch...">
                    <button id="load-video-btn">Charger</button>
                </div>
                
                <div class="media-container" id="media-box">
                    <!-- Le lecteur HTML5 standard par défaut -->
                    <video id="video-player" controls></video>
                </div>
            </div>

            <!-- Espace Lecteur de Musique / Audio -->
            <div class="card">
                <h3><i class="fa-solid fa-music music-icon"></i> Espace Musique & Audio</h3>
                <div class="input-group">
                    <input type="text" id="audio-url-input" placeholder="Lien direct vers un fichier audio (MP3, WAV)...">
                    <button id="load-audio-btn">Lancer la Musique</button>
                </div>
                <div class="audio-player-wrapper">
                    <audio id="audio-player" controls></audio>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        // Éléments d'écrans
        const authScreen = document.getElementById('auth-screen');
        const roomScreen = document.getElementById('room-screen');
        const roomDisplayId = document.getElementById('room-display-id');

        // Boutons et Inputs
        const btnCreateRoom = document.getElementById('create-room-btn');
        const roomInput = document.getElementById('room-input');
        const btnJoinRoom = document.getElementById('join-room-btn');
        const videoPlayer = document.getElementById('video-player');
        const videoUrlInput = document.getElementById('video-url-input');
        const btnLoadVideo = document.getElementById('load-video-btn');
        const mediaBox = document.getElementById('media-box');

        // Musique
        const audioPlayer = document.getElementById('audio-player');
        const audioUrlInput = document.getElementById('audio-url-input');
        const btnLoadAudio = document.getElementById('load-audio-btn');

        let currentRoomId = null;
        let isSyncing = false;

        // Gestion automatique du rafraîchissement (F5)
        const urlParams = new URLSearchParams(window.location.search);
        const roomIdFromUrl = urlParams.get('room');
        if (roomIdFromUrl) {
            initializeRoom(roomIdFromUrl);
        }

        if (btnCreateRoom) {
            btnCreateRoom.addEventListener('click', () => {
                const randomId = 'room-' + Math.random().toString(36).substring(2, 9);
                initializeRoom(randomId);
            });
        }

        if (btnJoinRoom) {
            btnJoinRoom.addEventListener('click', () => {
                const roomId = roomInput.value.trim();
                if (roomId) initializeRoom(roomId);
            });
        }

        function initializeRoom(roomId) {
            currentRoomId = roomId;
            window.history.pushState({}, '', `?room=${roomId}`);
            socket.emit('join-room', { roomId, username: 'Utilisateur' });
            
            // BASCULE DES ÉCRANS : On masque l'accueil et on affiche le salon !
            authScreen.style.display = 'none';
            roomScreen.style.display = 'block';
            roomDisplayId.innerHTML = `<i class="fa-solid fa-circle-check"></i> Salon Privé Actif : <strong>${roomId}</strong> | Partagez ce lien URL à vos amis !`;
        }

        // --- ENVOI ET FORMATAGE DES LIENS VIDÉO (YouTube / Twitch / Direct) ---
        if (btnLoadVideo) {
            btnLoadVideo.addEventListener('click', () => {
                const url = videoUrlInput.value.trim();
                if (url && currentRoomId) {
                    loadMediaSource(url);
                    socket.emit('change-video', { roomId: currentRoomId, videoUrl: url });
                }
            });
        }

        function loadMediaSource(url) {
            // Détection YouTube
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                let videoId = '';
                if(url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1].split(/[?#]/)[0];
                else if(url.includes('v=')) videoId = url.split('v=')[1].split('&')[0];
                
                mediaBox.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?enablejsapi=1&autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            } 
            // Détection Twitch
            else if (url.includes('twitch.tv')) {
                let channelName = url.split('twitch.tv/')[1].split(/[?#]/)[0];
                mediaBox.innerHTML = `<iframe src="https://player.twitch.tv/?channel=${channelName}&parent=${window.location.hostname}&autoplay=true" allowfullscreen></iframe>`;
            } 
            // Fichier direct (MP4...)
            else {
                mediaBox.innerHTML = `<video id="video-player" controls autoplay src="${url}"></video>`;
                bindVideoEvents(); // Ré-attache les écouteurs de synchro sur la nouvelle balise vidéo
            }
        }

        function bindVideoEvents() {
            const vp = document.getElementById('video-player');
            if(!vp) return;
            vp.addEventListener('play', () => { if (!isSyncing && currentRoomId) socket.emit('video-action', { roomId: currentRoomId, action: 'play', currentTime: vp.currentTime }); });
            vp.addEventListener('pause', () => { if (!isSyncing && currentRoomId) socket.emit('video-action', { roomId: currentRoomId, action: 'pause', currentTime: vp.currentTime }); });
            vp.addEventListener('seeked', () => { if (!isSyncing && currentRoomId) socket.emit('video-action', { roomId: currentRoomId, action: 'seek', currentTime: vp.currentTime }); });
        }
        bindVideoEvents();

        // --- LOGIQUE MUSIQUE / AUDIO ---
        if (btnLoadAudio) {
            btnLoadAudio.addEventListener('click', () => {
                const url = audioUrlInput.value.trim();
                if (url && currentRoomId) {
                    audioPlayer.src = url;
                    audioPlayer.play();
                    socket.emit('change-audio', { roomId: currentRoomId, audioUrl: url }); // Note: ton serveur accepte les sockets génériques
                }
            });
        }
        audioPlayer.addEventListener('play', () => { if(!isSyncing && currentRoomId) socket.emit('video-action', { roomId: currentRoomId, action: 'audio-play', currentTime: audioPlayer.currentTime }); });
        audioPlayer.addEventListener('pause', () => { if(!isSyncing && currentRoomId) socket.emit('video-action', { roomId: currentRoomId, action: 'audio-pause', currentTime: audioPlayer.currentTime }); });

        // --- RÉCEPTION DES ÉVÉNEMENTS SOCKET ---
        socket.on('user-changed-video', ({ videoUrl }) => {
            isSyncing = true;
            loadMediaSource(videoUrl);
            isSyncing = false;
        });

        socket.on('user-video-action', ({ action, currentTime }) => {
            isSyncing = true;
            const vp = document.getElementById('video-player');
            
            // Actions Vidéo Locale
            if (vp && ['play', 'pause', 'seek'].includes(action)) {
                vp.currentTime = currentTime;
                if (action === 'play') vp.play();
                else if (action === 'pause') vp.pause();
            }
            // Actions Audio
            if (action === 'audio-play') { audioPlayer.currentTime = currentTime; audioPlayer.play(); }
            if (action === 'audio-pause') { audioPlayer.pause(); }
            
            isSyncing = false;
        });

        socket.on('sync-video', ({ videoUrl, isPlaying }) => {
            isSyncing = true;
            loadMediaSource(videoUrl);
            const vp = document.getElementById('video-player');
            if (vp && isPlaying) vp.play();
            isSyncing = false;
        });
    </script>
</body>
</html>
