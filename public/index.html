<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub - Watch Party & Mini-Jeux Sync</title>
    <style>
        :root {
            --bg-main: #0f0f13;
            --bg-card: #1a1c23;
            --bg-input: #252833;
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #ff007f;
            --text-main: #ffffff;
            --text-muted: #a0a5b5;
            --border: #2e3245;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* MODAL CONNEXION */
        #login-modal {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 16px;
            width: 360px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-card h2 {
            text-align: center;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.85em;
            color: var(--text-muted);
        }

        .input-group input {
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            outline: none;
        }

        .btn-primary {
            padding: 12px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        /* LAYOUT PRINCIPAL */
        #app {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        .main-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            overflow-y: auto;
        }

        /* LECTEUR MEDIA */
        .player-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            border: 1px solid var(--border);
        }

        .player-wrapper iframe, .player-wrapper video {
            width: 100%;
            height: 100%;
            border: none;
        }

        .media-bar {
            display: flex;
            gap: 10px;
            background: var(--bg-card);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .media-bar input {
            flex: 1;
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: white;
            outline: none;
        }

        /* SECTION MINI JEUX */
        .games-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .game-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .game-title {
            font-weight: bold;
            color: var(--primary);
        }

        .game-status {
            font-size: 0.85em;
            color: var(--text-muted);
        }

        /* GRILLE MORPION */
        .ttt-grid {
            display: grid;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(3, 70px);
            gap: 6px;
        }

        .ttt-cell {
            background: var(--bg-input);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .ttt-cell:hover { background: #2f3444; }
        .ttt-cell.x { color: var(--accent); }
        .ttt-cell.o { color: var(--primary); }

        /* GRILLE PUISSANCE 4 */
        .c4-grid {
            display: grid;
            grid-template-columns: repeat(7, 38px);
            grid-template-rows: repeat(6, 38px);
            gap: 6px;
            background: #152238;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #1e3a8a;
        }

        .c4-cell {
            background: var(--bg-main);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .c4-cell:hover { transform: scale(1.05); }
        .c4-cell.p1 { background: #ff4e50; box-shadow: inset 0 0 5px #000; }
        .c4-cell.p2 { background: #ffd700; box-shadow: inset 0 0 5px #000; }

        .btn-reset {
            margin-top: 12px;
            padding: 6px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8em;
        }

        .btn-reset:hover { color: white; border-color: var(--primary); }

        /* SIDEBAR (CHAT / VISIO / PLAYLIST) */
        .sidebar {
            width: 360px;
            background: var(--bg-card);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            padding: 14px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 600;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-panel {
            display: none;
            flex: 1;
            flex-direction: column;
            padding: 15px;
            overflow: hidden;
        }

        .tab-panel.active { display: flex; }

        /* CHAT PANEL */
        .chat-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 5px;
        }

        .chat-item {
            background: var(--bg-input);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9em;
            line-height: 1.4;
        }

        .chat-item.system {
            background: transparent;
            color: var(--text-muted);
            font-style: italic;
            text-align: center;
            font-size: 0.8em;
        }

        .chat-form {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .chat-form input {
            flex: 1;
            padding: 10px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: white;
            outline: none;
        }

        /* VISIO PANEL */
        .visio-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            overflow-y: auto;
        }

        .stream-card {
            position: relative;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid transparent;
        }

        .stream-card.speaking { border-color: var(--primary); }

        .stream-card video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .stream-card .username-tag {
            position: absolute;
            bottom: 6px;
            left: 6px;
            background: rgba(0,0,0,0.7);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75em;
        }

        /* PLAYLIST PANEL */
        .playlist-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .playlist-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-input);
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85em;
        }

        .playlist-card button {
            background: #ff4e50;
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <!-- MODAL DE CONNEXION -->
    <div id="login-modal">
        <div class="modal-card">
            <h2>StreamHub</h2>
            <div class="input-group">
                <label>Pseudo</label>
                <input type="text" id="username-input" placeholder="Ton pseudo..." value="Invité">
            </div>
            <div class="input-group">
                <label>Code du Salon</label>
                <input type="text" id="room-input" placeholder="Ex: general" value="general">
            </div>
            <button class="btn-primary" id="btn-join">Rejoindre le salon</button>
        </div>
    </div>

    <!-- STRUCTURE PRINCIPALE -->
    <div id="app">
        <!-- ZONNE PRINCIPALE -->
        <div class="main-zone">
            <!-- Lecteur Médias -->
            <div class="player-wrapper" id="player-container">
                <iframe id="yt-player" src="https://www.youtube.com/embed/jfKfPfyJRdk?enablejsapi=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>

            <!-- Barre d'URL -->
            <div class="media-bar">
                <input type="text" id="video-url-input" placeholder="Lien YouTube, Twitch ou vidéo MP4 directe...">
                <button class="btn-primary" id="btn-load-video">Lancer</button>
                <button class="btn-primary" id="btn-add-playlist" style="background: linear-gradient(45deg, #a044ff, #ff4e50); color: white;">+ Playlist</button>
            </div>

            <!-- Jeux synchronisés -->
            <div class="games-container">
                <!-- Morpion -->
                <div class="game-box">
                    <div class="game-header">
                        <span class="game-title">Morpion</span>
                        <span class="game-status" id="ttt-status">En attente...</span>
                    </div>
                    <div class="ttt-grid" id="ttt-grid">
                        <div class="ttt-cell" data-idx="0"></div>
                        <div class="ttt-cell" data-idx="1"></div>
                        <div class="ttt-cell" data-idx="2"></div>
                        <div class="ttt-cell" data-idx="3"></div>
                        <div class="ttt-cell" data-idx="4"></div>
                        <div class="ttt-cell" data-idx="5"></div>
                        <div class="ttt-cell" data-idx="6"></div>
                        <div class="ttt-cell" data-idx="7"></div>
                        <div class="ttt-cell" data-idx="8"></div>
                    </div>
                    <button class="btn-reset" id="btn-reset-ttt">Nouvelle Partie</button>
                </div>

                <!-- Puissance 4 -->
                <div class="game-box">
                    <div class="game-header">
                        <span class="game-title">Puissance 4</span>
                        <span class="game-status" id="c4-status">En attente...</span>
                    </div>
                    <div class="c4-grid" id="c4-grid"></div>
                    <button class="btn-reset" id="btn-reset-c4">Nouvelle Partie</button>
                </div>
            </div>
        </div>

        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="tabs">
                <button class="tab active" onclick="setTab('chat')">Chat</button>
                <button class="tab" onclick="setTab('visio')">Visio</button>
                <button class="tab" onclick="setTab('playlist')">Playlist</button>
            </div>

            <!-- ONGLET CHAT -->
            <div id="panel-chat" class="tab-panel active">
                <div class="chat-list" id="chat-list"></div>
                <div class="chat-form">
                    <input type="text" id="chat-input" placeholder="Message...">
                    <button class="btn-primary" id="btn-send-chat">Envoyer</button>
                </div>
            </div>

            <!-- ONGLET VISIO -->
            <div id="panel-visio" class="tab-panel">
                <div class="visio-grid" id="visio-grid">
                    <div class="stream-card" id="local-stream-card">
                        <video id="local-video" autoplay muted playsinline></video>
                        <span class="username-tag">Moi</span>
                    </div>
                </div>
            </div>

            <!-- ONGLET PLAYLIST -->
            <div id="panel-playlist" class="tab-panel">
                <div class="playlist-list" id="playlist-list"></div>
            </div>
        </div>
    </div>

    <!-- LOGIQUE JAVASCRIPT CLIENT -->
    <script>
        const socket = io();

        // Éléments UI
        const loginModal = document.getElementById('login-modal');
        const btnJoin = document.getElementById('btn-join');
        const usernameInput = document.getElementById('username-input');
        const roomInput = document.getElementById('room-input');

        const chatList = document.getElementById('chat-list');
        const chatInput = document.getElementById('chat-input');
        const btnSendChat = document.getElementById('btn-send-chat');

        const tttStatus = document.getElementById('ttt-status');
        const tttCells = document.querySelectorAll('.ttt-cell');
        const btnResetTTT = document.getElementById('btn-reset-ttt');

        const c4Status = document.getElementById('c4-status');
        const c4Grid = document.getElementById('c4-grid');
        const btnResetC4 = document.getElementById('btn-reset-c4');

        const playlistList = document.getElementById('playlist-list');

        // Génération dynamique du plateau de Puissance 4
        for (let r = 0; r < 6; r++) {
            for (let c = 0; c < 7; c++) {
                const cell = document.createElement('div');
                cell.className = 'c4-cell';
                cell.dataset.col = c;
                cell.addEventListener('click', () => {
                    socket.emit('c4-move', { col: c });
                });
                c4Grid.appendChild(cell);
            }
        }

        // Rejoindre un salon
        btnJoin.addEventListener('click', () => {
            const username = usernameInput.value.trim() || 'Anonyme';
            const roomId = roomInput.value.trim() || 'general';

            socket.emit('join-room', { roomId, username });
            loginModal.style.display = 'none';
            initVisio();
        });

        // Navigation des onglets
        function setTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(`panel-${tabName}`).classList.add('active');
        }

        // --- GESTION CHAT ---
        function sendMsg() {
            const text = chatInput.value.trim();
            if (text) {
                socket.emit('send-chat-message', { message: text });
                chatInput.value = '';
            }
        }

        btnSendChat.addEventListener('click', sendMsg);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMsg(); });

        socket.on('chat-message', ({ username, message, color, isSystem }) => {
            const div = document.createElement('div');
            div.className = 'chat-item' + (isSystem ? ' system' : '');
            if (!isSystem) {
                div.innerHTML = `<strong style="color:${color}">${username}:</strong> ${message}`;
            } else {
                div.innerText = message;
            }
            chatList.appendChild(div);
            chatList.scrollTop = chatList.scrollHeight;
        });

        // --- GESTION MORPION ---
        tttCells.forEach(cell => {
            cell.addEventListener('click', () => {
                const idx = cell.getAttribute('data-idx');
                socket.emit('ttt-move', { idx });
            });
        });

        btnResetTTT.addEventListener('click', () => socket.emit('ttt-reset'));

        socket.on('ttt-update', ({ board, turn, winner, playerX, playerO }) => {
            tttCells.forEach((c, i) => {
                c.innerText = board[i];
                c.className = 'ttt-cell ' + (board[i] === 'X' ? 'x' : board[i] === 'O' ? 'o' : '');
            });

            if (winner) {
                tttStatus.innerText = winner === 'Tie' ? "Match Nul !" : `🎉 Victoire : ${winner}`;
            } else {
                const amIX = socket.id === playerX;
                const amIO = socket.id === playerO;
                let role = amIX ? " (Tu es X)" : amIO ? " (Tu es O)" : (playerX && playerO) ? " (Spectateur)" : "";
                tttStatus.innerText = `Tour : ${turn}${role}`;
            }
        });

        // --- GESTION PUISSANCE 4 ---
        btnResetC4.addEventListener('click', () => socket.emit('c4-reset'));

        socket.on('c4-update', ({ board, turn, winner, player1, player2 }) => {
            const cells = c4Grid.querySelectorAll('.c4-cell');
            for (let r = 0; r < 6; r++) {
                for (let c = 0; c < 7; c++) {
                    const idx = r * 7 + c;
                    const val = board[r][c];
                    cells[idx].className = 'c4-cell ' + (val === 1 ? 'p1' : val === 2 ? 'p2' : '');
                }
            }

            if (winner) {
                if (winner === 'Tie') {
                    c4Status.innerText = "Match Nul !";
                } else {
                    c4Status.innerText = `🎉 Victoire ${winner === 1 ? '🔴 Rouge' : '🟡 Jaune'} !`;
                }
            } else {
                const amIP1 = socket.id === player1;
                const amIP2 = socket.id === player2;
                let role = amIP1 ? " (Tu es Rouge)" : amIP2 ? " (Tu es Jaune)" : (player1 && player2) ? " (Spectateur)" : "";
                c4Status.innerText = `Tour : ${turn === 1 ? '🔴 Rouge' : '🟡 Jaune'}${role}`;
            }
        });

        // --- PLAYLIST ---
        document.getElementById('btn-add-playlist').addEventListener('click', () => {
            const url = document.getElementById('video-url-input').value.trim();
            if (url) {
                socket.emit('add-to-playlist', { videoUrl: url });
                document.getElementById('video-url-input').value = '';
            }
        });

        socket.on('update-playlist', (playlist) => {
            playlistList.innerHTML = '';
            playlist.forEach(item => {
                const div = document.createElement('div');
                div.className = 'playlist-card';
                div.innerHTML = `
                    <span>${item.title}</span>
                    <button onclick="socket.emit('remove-from-playlist', { itemId: '${item.id}' })">Supprimer</button>
                `;
                playlistList.appendChild(div);
            });
        });

        // --- WEBRTC STUB ---
        async function initVisio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = stream;
            } catch (e) {
                console.log("Caméra/Micro indisponible(s)");
            }
        }
    </script>
</body>
</html>
