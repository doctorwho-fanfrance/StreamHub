<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub - Regarder des vidéos ensemble</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            text-align: center;
        }
        .card {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        input, button {
            padding: 10px;
            margin: 5px;
            border-radius: 4px;
            border: none;
            font-size: 16px;
        }
        input {
            width: 60%;
            background-color: #2a2a2a;
            color: white;
        }
        button {
            background-color: #6200ee;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #3700b3;
        }
        video {
            width: 100%;
            max-height: 450px;
            border-radius: 8px;
            background-color: black;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>StreamHub 🎬</h1>
        
        <!-- Section Connexion / Salons -->
        <div class="card">
            <h3>Gestion du Salon</h3>
            <button id="create-room-btn">Créer un salon privé</button>
            <br><br>
            <input type="text" id="room-input" placeholder="Entrer l'ID d'un salon existant...">
            <button id="join-room-btn">Rejoindre</button>
        </div>

        <!-- Section Lecteur Vidéo -->
        <div class="card">
            <h3>Lecteur Synchronisé</h3>
            <input type="text" id="video-url-input" placeholder="Coller le lien de votre vidéo (MP4, Direct URL)...">
            <button id="load-video-btn">Charger la vidéo</button>
            
            <video id="video-player" controls></video>
        </div>
    </div>

    <!-- Script de communication Socket.io fourni par le serveur -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io(); // Connexion automatique à l'adresse Render du site

        // Récupération des éléments de l'interface
        const btnCreateRoom = document.getElementById('create-room-btn');
        const roomInput = document.getElementById('room-input');
        const btnJoinRoom = document.getElementById('join-room-btn');
        const videoPlayer = document.getElementById('video-player');
        const videoUrlInput = document.getElementById('video-url-input');
        const btnLoadVideo = document.getElementById('load-video-btn');

        let currentRoomId = null;
        let isSyncing = false; // Drapeau pour bloquer les boucles infinies d'événements

        // --- GESTION DE LA PERSISTENCE AU REFRESH (F5) ---
        // Au chargement, on extrait l'identifiant "?room=xxxx" s'il existe dans l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const roomIdFromUrl = urlParams.get('room');

        if (roomIdFromUrl) {
            initializeRoom(roomIdFromUrl);
        }

        // Clic sur le bouton "Créer un salon privé"
        if (btnCreateRoom) {
            btnCreateRoom.addEventListener('click', () => {
                const randomId = 'room-' + Math.random().toString(36).substring(2, 9);
                initializeRoom(randomId);
            });
        }

        // Clic sur le bouton "Rejoindre"
        if (btnJoinRoom) {
            btnJoinRoom.addEventListener('click', () => {
                const roomId = roomInput.value.trim();
                if (roomId) initializeRoom(roomId);
            });
        }

        function initializeRoom(roomId) {
            currentRoomId = roomId;
            
            // On met à jour l'URL du navigateur dynamiquement sans recharger la page
            window.history.pushState({}, '', `?room=${roomId}`);
            
            // Notification au serveur Socket
            socket.emit('join-room', { roomId, username: 'Utilisateur' });
            
            console.log(`Connecté au salon : ${roomId}`);
            alert(`Salon connecté ! Partagez ce lien exact pour inviter vos amis : \n${window.location.href}`);
        }

        // --- ENVOI DES ACTIONS DU LECTEUR AU SERVEUR ---

        // Clic sur "Charger la vidéo"
        if (btnLoadVideo) {
            btnLoadVideo.addEventListener('click', () => {
                const url = videoUrlInput.value.trim();
                if (url && currentRoomId) {
                    videoPlayer.src = url;
                    videoPlayer.play();
                    socket.emit('change-video', { roomId: currentRoomId, videoUrl: url });
                }
            });
        }

        // Détection du bouton Play
        videoPlayer.addEventListener('play', () => {
            if (isSyncing || !currentRoomId) return;
            socket.emit('video-action', { roomId: currentRoomId, action: 'play', currentTime: videoPlayer.currentTime });
        });

        // Détection du bouton Pause
        videoPlayer.addEventListener('pause', () => {
            if (isSyncing || !currentRoomId) return;
            socket.emit('video-action', { roomId: currentRoomId, action: 'pause', currentTime: videoPlayer.currentTime });
        });

        // Détection du déplacement dans la barre de temps (Seek)
        videoPlayer.addEventListener('seeked', () => {
            if (isSyncing || !currentRoomId) return;
            socket.emit('video-action', { roomId: currentRoomId, action: 'seek', currentTime: videoPlayer.currentTime });
        });

        // --- RÉCEPTION DES ACTIONS EN PROVENANCE DU SERVEUR ---

        // Un ami a changé la source de la vidéo
        socket.on('user-changed-video', ({ videoUrl }) => {
            isSyncing = true;
            videoPlayer.src = videoUrl;
            videoPlayer.play();
            isSyncing = false;
        });

        // Un ami a fait Play / Pause / Reculé / Avancé
        socket.on('user-video-action', ({ action, currentTime }) => {
            isSyncing = true;
            videoPlayer.currentTime = currentTime;
            if (action === 'play') {
                videoPlayer.play();
            } else if (action === 'pause') {
                videoPlayer.pause();
            }
            isSyncing = false;
        });

        // Synchronisation à l'arrivée dans un salon où une vidéo tourne déjà
        socket.on('sync-video', ({ videoUrl, isPlaying }) => {
            isSyncing = true;
            videoPlayer.src = videoUrl;
            if (isPlaying) {
                videoPlayer.play();
            }
            isSyncing = false;
        });
    </script>
</body>
</html>
