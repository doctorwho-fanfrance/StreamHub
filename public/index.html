<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub - Regarder et Écouter Ensemble</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c1b 0%, #05050d 100%);
            --card-bg: rgba(20, 20, 35, 0.65);
            --accent-primary: #8a2be2;
            --accent-secondary: #4a00e0;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --glow: 0 0 20px rgba(138, 43, 226, 0.4);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 950px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            background: linear-gradient(45deg, #ff007f, #8a2be2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #auth-screen {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            #auth-screen { grid-template-columns: 1fr; }
        }

        #room-screen {
            display: none;
        }

        .room-status {
            background: rgba(138, 43, 226, 0.2);
            border: 1px solid var(--accent-primary);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 25px;
        }

        .card h3 {
            margin: 0 0 5px 0;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h3 i { color: #ff007f; }
        .card h3 i.music-icon { color: #00f2fe; }

        .hint {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 15px;
            display: block;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.2);
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow);
        }

        .btn-block { width: 100%; }
        .btn-secondary { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); }

        .media-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 15px;
        }

        video, iframe, #yt-player-placeholder {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .audio-container {
            width: 100%;
            margin-top: 15px;
            border-radius: 12px;
            overflow: hidden;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 10px;
            width: fit-content;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 120px;
            height: 5px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent-primary);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>StreamHub</h1>
            <p>Salons privés synchronisés pour vidéos, streams et musique.</p>
        </header>
        
        <div id="auth-screen">
            <div class="card">
                <h3><i class="fa-solid fa-wand-magic-sparkles"></i> Lancer une session</h3>
                <button id="create-room-btn" class="btn-block">Créer un salon privé</button>
            </div>
            <div class="card">
                <h3><i class="fa-solid fa-right-to-bracket"></i> Rejoindre un ami</h3>
                <div class="input-group">
                    <input type="text" id="room-input" placeholder="ID du salon...">
                    <button id="join-room-btn" class="btn-secondary">Rejoindre</button>
                </div>
            </div>
        </div>

        <div id="room-screen">
            <div class="room-status" id="room-display-id">Connecté</div>

            <!-- VIDÉO -->
            <div class="card">
                <h3><i class="fa-solid fa-play-pause"></i> Lecteur Vidéo Synchro</h3>
                <div class="input-group">
                    <input type="text" id="video-url-input" placeholder="Lien MP4, YouTube...">
                    <button id="load-video-btn">Charger</button>
                </div>
                <div class="media-container" id="media-box">
                    <video id="video-player" controls></video>
                </div>
                <div class="volume-control">
                    <i class="fa-solid fa-volume-high"></i>
                    <input type="range" id="video-volume" class="volume-slider" min="0" max="100" value="100">
                </div>
            </div>

            <!-- MUSIQUE (RETOUR DU VRAI SPOTIFY EMBED) -->
            <div class="card">
                <h3><i class="fa-solid fa-music music-icon"></i> Espace Musique & Playlists</h3>
                <span class="hint"><i class="fa-brands fa-spotify"></i> Utilisez le bouton volume en bas à droite du lecteur Spotify pour régler précisément le son !</span>
                <div class="input-group">
                    <input type="text" id="audio-url-input" placeholder="Lien Spotify ou .mp3...">
                    <button id="load-audio-btn">Lancer la Musique</button>
                </div>
                <div id="audio-box" class="audio-container">
                    <audio id="audio-player" controls style="width: 100%; display: none;"></audio>
                </div>
                <div class="volume-control">
                    <i class="fa-solid fa-sliders"></i>
                    <span style="font-size: 0.85rem; color: var(--text-muted);">Volume MP3 :</span>
                    <input type="range" id="audio-volume" class="volume-slider" min="0" max="100" value="80">
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const authScreen = document.getElementById('auth-screen');
        const roomScreen = document.getElementById('room-screen');
        const roomDisplayId = document.getElementById('room-display-id');
        const btnCreateRoom = document.getElementById('create-room-btn');
        const roomInput = document.getElementById('room-input');
        const btnJoinRoom = document.getElementById('join-room-btn');
        const videoUrlInput = document.getElementById('video-url-input');
        const btnLoadVideo = document.getElementById('load-video-btn');
        const mediaBox = document.getElementById('media-box');
        const audioBox = document.getElementById('audio-box');
        const audioUrlInput = document.getElementById('audio-url-input');
        const btnLoadAudio = document.getElementById('load-audio-btn');
        const videoVolumeSlider = document.getElementById('video-volume');
        const audioVolumeSlider = document.getElementById('audio-volume');

        let currentRoomId = null;
        let isSyncing = false;
        let ytPlayer = null;
        let ytLastState = -1;

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('room')) initializeRoom(urlParams.get('room'));

        if (btnCreateRoom) btnCreateRoom.addEventListener('click', () => initializeRoom('room-' + Math.random().toString(36).substring(2, 9)));
        if (btnJoinRoom) btnJoinRoom.addEventListener('click', () => roomInput.value.trim() && initializeRoom(roomInput.value.trim()));

        function initializeRoom(roomId) {
            currentRoomId = roomId;
            window.history.pushState({}, '', `?room=${roomId}`);
            socket.emit('join-room', { roomId, username: 'Utilisateur' });
            authScreen.style.display = 'none';
            roomScreen.style.display = 'block';
            roomDisplayId.innerHTML = `<i class="fa-solid fa-circle-check"></i> Salon Privé : <strong>${roomId}</strong>`;
        }

        // Volumes
        videoVolumeSlider.addEventListener('input', (e) => {
            const vp = document.getElementById('video-player');
            if (vp) vp.volume = e.target.value / 100;
            if (ytPlayer && typeof ytPlayer.setVolume === 'function') ytPlayer.setVolume(e.target.value);
        });

        audioVolumeSlider.addEventListener('input', (e) => {
            const ap = document.getElementById('audio-player');
            if (ap) ap.volume = e.target.value / 100;
        });

        // Vidéos
        if (btnLoadVideo) {
            btnLoadVideo.addEventListener('click', () => {
                const url = videoUrlInput.value.trim();
                if (url && currentRoomId) {
                    loadMediaSource(url);
                    socket.emit('change-video', { roomId: currentRoomId, videoUrl: url });
                }
            });
        }

        function loadMediaSource(url) {
            ytPlayer = null;
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                let videoId = url.includes('youtu.be/') ? url.split('youtu.be/')[1].split(/[?#]/)[0] : url.split('v=')[1].split('&')[0];
                mediaBox.innerHTML = `<div id="yt-player-placeholder"></div>`;
                ytPlayer = new YT.Player('yt-player-placeholder', {
                    videoId: videoId,
                    playerVars: { 'autoplay': 1, 'controls': 1 },
                    events: {
                        'onStateChange': (e) => {
                            if (isSyncing) return;
                            if (e.data === 1 && ytLastState !== 1) socket.emit('video-action', { roomId: currentRoomId, action: 'play', currentTime: ytPlayer.getCurrentTime() });
                            if (e.data === 2 && ytLastState !== 2) socket.emit('video-action', { roomId: currentRoomId, action: 'pause', currentTime: ytPlayer.getCurrentTime() });
                            ytLastState = e.data;
                        },
                        'onReady': (e) => e.target.setVolume(videoVolumeSlider.value)
                    }
                });
            } else {
                mediaBox.innerHTML = `<video id="video-player" controls autoplay src="${url}"></video>`;
                setTimeout(() => {
                    const vp = document.getElementById('video-player');
                    if(vp) {
                        vp.volume = videoVolumeSlider.value / 100;
                        vp.onplay = () => !isSyncing && socket.emit('video-action', { roomId: currentRoomId, action: 'play', currentTime: vp.currentTime });
                        vp.onpause = () => !isSyncing && socket.emit('video-action', { roomId: currentRoomId, action: 'pause', currentTime: vp.currentTime });
                    }
                }, 200);
            }
        }

        // Musiques
        if (btnLoadAudio) {
            btnLoadAudio.addEventListener('click', () => {
                const url = audioUrlInput.value.trim();
                if (url && currentRoomId) {
                    loadAudioSource(url);
                    socket.emit('change-audio', { roomId: currentRoomId, audioUrl: url });
                }
            });
        }

        function loadAudioSource(url) {
            const ap = document.getElementById('audio-player');
            ap.style.display = 'none';
            ap.src = '';

            if (url.includes('spotify.com')) {
                let embedUrl = url.replace('spotify.com/', 'spotify.com/embed/');
                audioBox.innerHTML = `<iframe src="${embedUrl}" width="100%" height="152" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen" loading="lazy"></iframe>`;
            } else {
                ap.style.display = 'block';
                ap.src = url;
                ap.volume = audioVolumeSlider.value / 100;
                ap.play().catch(()=>{});
            }
        }

        socket.on('user-changed-video', ({ videoUrl }) => loadMediaSource(videoUrl));
        socket.on('user-changed-audio', ({ audioUrl }) => loadAudioSource(audioUrl));
        socket.on('user-video-action', ({ action, currentTime }) => {
            isSyncing = true;
            if (ytPlayer && typeof ytPlayer.getPlayerState === 'function') {
                if (Math.abs(ytPlayer.getCurrentTime() - currentTime) > 2) ytPlayer.seekTo(currentTime, true);
                action === 'play' ? ytPlayer.playVideo() : ytPlayer.pauseVideo();
            } else {
                const vp = document.getElementById('video-player');
                if (vp) { vp.currentTime = currentTime; action === 'play' ? vp.play().catch(()=>{}) : vp.pause(); }
            }
            setTimeout(() => isSyncing = false, 300);
        });
    </script>
</body>
</html>
