<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub - Watch Party & Games</title>
    <style>
        :root {
            --bg-dark: #0f1015;
            --bg-card: #181a20;
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #ff007f;
            --text: #ffffff;
            --text-muted: #a0a0a0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* LAYOUT PRINCIPAL */
        #app {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            overflow-y: auto;
        }

        .sidebar {
            width: 380px;
            background-color: var(--bg-card);
            display: flex;
            flex-direction: column;
            border-left: 1px solid #2a2d37;
        }

        /* MODAL DE CONNEXION */
        #login-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-box {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
        }

        .modal-box input, .modal-box button {
            padding: 12px;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        .modal-box input {
            background: #252830;
            color: white;
        }

        .modal-box button {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }

        /* LECTEUR VIDÉO */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* Ratio 16:9 */
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        .video-container iframe, .video-container video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }

        .controls-bar {
            display: flex;
            gap: 10px;
            background: var(--bg-card);
            padding: 15px;
            border-radius: 8px;
        }

        .controls-bar input {
            flex: 1;
            padding: 10px;
            background: #252830;
            border: 1px solid #3a3f4d;
            color: white;
            border-radius: 6px;
        }

        .controls-bar button {
            padding: 10px 20px;
            background: var(--primary);
            border: none;
            color: black;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }

        /* SECTION MINI-JEUX */
        .games-section {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .game-card {
            flex: 1;
            background: var(--bg-card);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-title {
            margin-bottom: 10px;
            font-size: 1.1em;
            color: var(--primary);
        }

        .game-status {
            font-size: 0.9em;
            margin-bottom: 10px;
            color: var(--text-muted);
            min-height: 20px;
        }

        /* MORPION */
        .ttt-grid {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
        }

        .ttt-cell {
            background: #252830;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }

        .ttt-cell.x { color: var(--accent); }
        .ttt-cell.o { color: var(--primary); }

        /* PUISSANCE 4 */
        .c4-grid {
            display: grid;
            grid-template-columns: repeat(7, 35px);
            grid-template-rows: repeat(6, 35px);
            gap: 5px;
            background: #004e92;
            padding: 8px;
            border-radius: 8px;
        }

        .c4-cell {
            background: var(--bg-dark);
            border-radius: 50%;
            cursor: pointer;
        }

        .c4-cell.p1 { background: #ff4e50; } /* Rouge */
        .c4-cell.p2 { background: #ffd700; } /* Jaune */

        .btn-reset {
            margin-top: 10px;
            padding: 5px 10px;
            background: #3a3f4d;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
        }

        /* SIDEBAR : CHAT, VISIO & PLAYLIST */
        .sidebar-tabs {
            display: flex;
            background: #121318;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            font-weight: bold;
        }

        .tab-content {
            display: none;
            flex: 1;
            flex-direction: column;
            padding: 15px;
            overflow: hidden;
        }

        .tab-content.active {
            display: flex;
        }

        /* CHAT */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 10px;
        }

        .chat-msg {
            background: #252830;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9em;
            word-break: break-word;
        }

        .chat-msg.system {
            background: transparent;
            font-style: italic;
            text-align: center;
            font-size: 0.8em;
        }

        .chat-input-zone {
            display: flex;
            gap: 5px;
        }

        .chat-input-zone input {
            flex: 1;
            padding: 10px;
            background: #252830;
            border: none;
            color: white;
            border-radius: 6px;
        }

        .chat-input-zone button {
            padding: 10px;
            background: var(--primary);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        /* WEBRTC VIDEOS */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            overflow-y: auto;
        }

        .user-video-box {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 4/3;
            border: 2px solid transparent;
        }

        .user-video-box.speaking {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        .user-video-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-video-box .tag {
            position: absolute;
            bottom: 5px; left: 5px;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75em;
        }

        /* PLAYLIST */
        .playlist-items {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .playlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #252830;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85em;
        }

        .playlist-item button {
            background: #ff4e50;
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <!-- MODAL INITIAL DE CONNEXION -->
    <div id="login-modal">
        <div class="modal-box">
            <h2>Rejoindre StreamHub</h2>
            <input type="text" id="username-input" placeholder="Ton pseudo..." value="Invité">
            <input type="text" id="room-input" placeholder="Nom du salon..." value="general">
            <button id="btn-join">Entrer dans le salon</button>
        </div>
    </div>

    <!-- APPLICATION PRINCIPALE -->
    <div id="app">
        <div class="main-content">
            <!-- Lecteur de média -->
            <div class="video-container" id="media-player-container">
                <iframe id="yt-player" src="https://www.youtube.com/embed/jfKfPfyJRdk?enablejsapi=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>

            <!-- Barre de contrôle URL -->
            <div class="controls-bar">
                <input type="text" id="video-url-input" placeholder="Lien YouTube, Twitch ou mp4 direct...">
                <button id="btn-load-video">Lancer</button>
                <button id="btn-add-playlist" style="background: var(--secondary);">+ Playlist</button>
            </div>

            <!-- Espace Jeux -->
            <div class="games-section">
                <!-- Morpion -->
                <div class="game-card">
                    <div class="game-title">Morpion</div>
                    <div class="game-status" id="ttt-status">Chargement...</div>
                    <div class="ttt-grid" id="ttt-grid">
                        <div class="ttt-cell" data-idx="0"></div>
                        <div class="ttt-cell" data-idx="1"></div>
                        <div class="ttt-cell" data-idx="2"></div>
                        <div class="ttt-cell" data-idx="3"></div>
                        <div class="ttt-cell" data-idx="4"></div>
                        <div class="ttt-cell" data-idx="5"></div>
                        <div class="ttt-cell" data-idx="6"></div>
                        <div class="ttt-cell" data-idx="7"></div>
                        <div class="ttt-cell" data-idx="8"></div>
                    </div>
                    <button class="btn-reset" id="btn-reset-ttt">Recommencer</button>
                </div>

                <!-- Puissance 4 -->
                <div class="game-card">
                    <div class="game-title">Puissance 4</div>
                    <div class="game-status" id="c4-status">Chargement...</div>
                    <div class="c4-grid" id="c4-grid">
                        <!-- Généré dynamiquement en JS -->
                    </div>
                    <button class="btn-reset" id="btn-reset-c4">Recommencer</button>
                </div>
            </div>
        </div>

        <!-- Sidebar droite (Chat / Visio / Playlist) -->
        <div class="sidebar">
            <div class="sidebar-tabs">
                <button class="tab-btn active" onclick="switchTab('chat')">Chat</button>
                <button class="tab-btn" onclick="switchTab('visio')">Visio</button>
                <button class="tab-btn" onclick="switchTab('playlist')">Playlist</button>
            </div>

            <!-- Tab Chat -->
            <div id="tab-chat" class="tab-content active">
                <div class="chat-messages" id="chat-messages"></div>
                <div class="chat-input-zone">
                    <input type="text" id="chat-input" placeholder="Ton message...">
                    <button id="btn-send-chat">Envoyer</button>
                </div>
            </div>

            <!-- Tab Visio -->
            <div id="tab-visio" class="tab-content">
                <div class="video-grid" id="video-grid">
                    <div class="user-video-box" id="local-video-box">
                        <video id="local-video" autoplay muted playsinline></video>
                        <div class="tag">Moi</div>
                    </div>
                </div>
            </div>

            <!-- Tab Playlist -->
            <div id="tab-playlist" class="tab-content">
                <div class="playlist-items" id="playlist-items"></div>
            </div>
        </div>
    </div>

    <!-- LOGIQUE JAVASCRIPT CLIENT -->
    <script>
        const socket = io();

        // Éléments du DOM
        const loginModal = document.getElementById('login-modal');
        const btnJoin = document.getElementById('btn-join');
        const usernameInput = document.getElementById('username-input');
        const roomInput = document.getElementById('room-input');

        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const btnSendChat = document.getElementById('btn-send-chat');

        const tttStatus = document.getElementById('ttt-status');
        const tttCells = document.querySelectorAll('.ttt-cell');
        const btnResetTTT = document.getElementById('btn-reset-ttt');

        const c4Status = document.getElementById('c4-status');
        const c4Grid = document.getElementById('c4-grid');
        const btnResetC4 = document.getElementById('btn-reset-c4');

        const playlistItems = document.getElementById('playlist-items');

        let myUsername = "Anonyme";
        let myRoom = "general";

        // Initialisation de la grille du Puissance 4
        for (let r = 0; r < 6; r++) {
            for (let c = 0; c < 7; c++) {
                const cell = document.createElement('div');
                cell.className = 'c4-cell';
                cell.dataset.col = c;
                cell.addEventListener('click', () => {
                    socket.emit('c4-move', { col: c });
                });
                c4Grid.appendChild(cell);
            }
        }

        // Connexion au salon
        btnJoin.addEventListener('click', () => {
            myUsername = usernameInput.value.trim() || 'Anonyme';
            myRoom = roomInput.value.trim() || 'general';

            socket.emit('join-room', { roomId: myRoom, username: myUsername });
            loginModal.style.display = 'none';
            initWebRTC();
        });

        // Gestion des Onglets
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        // --- GESTION DU CHAT ---
        btnSendChat.addEventListener('click', sendChatMessage);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChatMessage(); });

        function sendChatMessage() {
            const msg = chatInput.value.trim();
            if (msg) {
                socket.emit('send-chat-message', { message: msg });
                chatInput.value = '';
            }
        }

        socket.on('chat-message', ({ username, message, color, isSystem }) => {
            const div = document.createElement('div');
            div.className = 'chat-msg' + (isSystem ? ' system' : '');
            if (!isSystem) {
                div.innerHTML = `<strong style="color:${color}">${username}:</strong> ${message}`;
            } else {
                div.innerText = message;
            }
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });

        // --- GESTION DU MORPION ---
        tttCells.forEach(cell => {
            cell.addEventListener('click', () => {
                const idx = cell.getAttribute('data-idx');
                socket.emit('ttt-move', { idx });
            });
        });

        btnResetTTT.addEventListener('click', () => socket.emit('ttt-reset'));

        socket.on('ttt-update', ({ board, turn, winner, playerX, playerO }) => {
            tttCells.forEach((c, i) => {
                c.innerText = board[i];
                c.className = 'ttt-cell ' + (board[i] === 'X' ? 'x' : board[i] === 'O' ? 'o' : '');
            });

            if (winner) {
                tttStatus.innerText = winner === 'Tie' ? "Match Nul !" : `🎉 Victoire pour les ${winner} !`;
            } else {
                const amIX = socket.id === playerX;
                const amIO = socket.id === playerO;
                let roleText = "";
                if (amIX) roleText = " (Tu es X)";
                else if (amIO) roleText = " (Tu es O)";
                else if (playerX && playerO) roleText = " (Mode Spectateur)";

                tttStatus.innerText = `Tour : ${turn}${roleText}`;
            }
        });

        // --- GESTION DU PUISSANCE 4 ---
        btnResetC4.addEventListener('click', () => socket.emit('c4-reset'));

        socket.on('c4-update', ({ board, turn, winner, player1, player2 }) => {
            const cells = c4Grid.querySelectorAll('.c4-cell');
            for (let r = 0; r < 6; r++) {
                for (let c = 0; c < 7; c++) {
                    const idx = r * 7 + c;
                    const val = board[r][c];
                    cells[idx].className = 'c4-cell ' + (val === 1 ? 'p1' : val === 2 ? 'p2' : '');
                }
            }

            if (winner) {
                if (winner === 'Tie') {
                    c4Status.innerText = "Match Nul ! Grille pleine.";
                } else {
                    c4Status.innerText = `🎉 Victoire du Joueur ${winner === 1 ? '🔴 Rouge' : '🟡 Jaune'} !`;
                }
            } else {
                const amIP1 = socket.id === player1;
                const amIP2 = socket.id === player2;
                let roleText = "";
                if (amIP1) roleText = " (Tu es Rouge)";
                else if (amIP2) roleText = " (Tu es Jaune)";
                else if (player1 && player2) roleText = " (Mode Spectateur)";

                c4Status.innerText = `Tour : ${turn === 1 ? '🔴 Rouge' : '🟡 Jaune'}${roleText}`;
            }
        });

        // --- PLAYLIST ---
        document.getElementById('btn-add-playlist').addEventListener('click', () => {
            const url = document.getElementById('video-url-input').value.trim();
            if (url) {
                socket.emit('add-to-playlist', { videoUrl: url });
                document.getElementById('video-url-input').value = '';
            }
        });

        socket.on('update-playlist', (playlist) => {
            playlistItems.innerHTML = '';
            playlist.forEach(item => {
                const div = document.createElement('div');
                div.className = 'playlist-item';
                div.innerHTML = `
                    <span>${item.title}</span>
                    <button onclick="removeFromPlaylist('${item.id}')">X</button>
                `;
                playlistItems.appendChild(div);
            });
        });

        function removeFromPlaylist(itemId) {
            socket.emit('remove-from-playlist', { itemId });
        }

        // --- STUB WEBRTC (Caméra/Micro) ---
        async function initWebRTC() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = stream;
            } catch (err) {
                console.log("Accès caméra/micro refusé ou non disponible");
            }
        }
    </script>
</body>
</html>
