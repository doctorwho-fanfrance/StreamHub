<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub - Regarder Ensemble</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c1b 0%, #05050d 100%);
            --card-bg: rgba(20, 20, 35, 0.65);
            --accent-primary: #8a2be2;
            --accent-secondary: #4a00e0;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --glow: 0 0 20px rgba(138, 43, 226, 0.4);
            --twitch-color: #9146FF;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 30px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .container { width: 100%; max-width: 1300px; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 {
            font-size: 2.8rem; font-weight: 800; margin: 0;
            background: linear-gradient(45deg, #ff007f, #8a2be2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #auth-screen { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 800px; margin: 0 auto; }
        #room-screen { display: none; }
        @media (max-width: 992px) {
            #room-layout { grid-template-columns: 1fr !important; }
            #auth-screen { grid-template-columns: 1fr; }
        }

        .room-status {
            background: rgba(138, 43, 226, 0.15); border: 1px solid var(--accent-primary);
            padding: 12px; border-radius: 10px; text-align: center; margin-bottom: 20px; font-weight: 600;
        }

        #room-layout { display: grid; grid-template-columns: 1fr 400px; gap: 20px; align-items: start; }
        
        .card {
            background: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.07); padding: 22px; border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); margin-bottom: 20px;
        }
        .card h3 { margin: 0 0 10px 0; font-size: 1.15rem; display: flex; align-items: center; gap: 10px; }
        .card h3 i { color: #ff007f; }
        
        .input-group { display: flex; gap: 8px; margin-bottom: 12px; }
        input {
            flex: 1; padding: 10px 14px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: #fff; outline: none;
        }

        button {
            padding: 10px 20px; background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s ease;
        }
        button:hover { transform: translateY(-1px); box-shadow: var(--glow); }
        .btn-block { width: 100%; }
        .btn-secondary { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .btn-danger { background: linear-gradient(135deg, #ff0055 0%, #990033 100%); }
        .btn-webrtc { background: #00f2fe; color: #000; font-weight: 700; margin-bottom: 10px; }
        .btn-sync { background: linear-gradient(135deg, #f12711, #f5af19); color: white; font-weight: 700; margin-top: 10px; }

        .media-container {
            position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000;
            border-radius: 12px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); margin-top: 10px;
        }
        video, iframe, #yt-player-placeholder, #twitch-player { width: 100%; height: 100%; border: none; display: block; }

        .player-controls {
            display: flex; align-items: center; justify-content: space-between; margin-top: 12px;
            background: rgba(255, 255, 255, 0.04); padding: 8px 14px; border-radius: 8px;
        }
        .volume-control { display: flex; align-items: center; gap: 12px; }
        .volume-slider { -webkit-appearance: none; width: 110px; height: 4px; background: rgba(255, 255, 255, 0.2); outline: none; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent-primary); }

        .video-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 10px; margin-bottom: 15px; background: rgba(0, 0, 0, 0.2); padding: 10px; border-radius: 12px;
        }
        .video-wrapper {
            position: relative; aspect-ratio: 4 / 3; background: #1a1a2e; border-radius: 8px; overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1); transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .video-wrapper.speaking {
            border-color: #00ff87 !important;
            box-shadow: 0 0 15px rgba(0, 255, 135, 0.6);
        }
        .video-wrapper video { width: 100%; height: 100%; object-fit: cover; }
        .video-wrapper .name-label {
            position: absolute; bottom: 4px; left: 4px; background: rgba(0,0,0,0.6);
            padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; color: #fff; max-width: 80%;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .users-badge { background: #00f2fe; color: #000; padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; }
        .user-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; padding: 8px; background: rgba(0, 0, 0, 0.2); border-radius: 8px; max-height: 60px; overflow-y: auto; }
        .user-tag { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); padding: 3px 10px; border-radius: 20px; font-size: 0.8rem; }
        .chat-box { height: 200px; background: rgba(0, 0, 0, 0.25); border-radius: 10px; padding: 12px; overflow-y: auto; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
        .chat-msg { font-size: 0.85rem; }
        .chat-msg .name { font-weight: 700; margin-right: 5px; }
        .chat-msg.system { color: var(--text-muted); font-style: italic; text-align: center; font-size: 0.8rem; }
        
        .playlist-box { max-height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
        .playlist-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255, 255, 255, 0.04); padding: 6px 10px; border-radius: 8px; font-size: 0.85rem; border-left: 3px solid var(--accent-primary); }
        .playlist-item .title-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
        .playlist-actions { display: flex; gap: 4px; }
        .playlist-item button { padding: 5px 8px; font-size: 0.75rem; border-radius: 6px; }
        .empty-playlist { color: var(--text-muted); font-size: 0.85rem; font-style: italic; text-align: center; padding: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>StreamHub</h1>
            <p>Salons de streaming collaboratifs avec Visio.</p>
        </header>
        
        <div id="auth-screen">
            <div class="card" style="grid-column: 1 / -1; margin-bottom: 10px;">
                <h3><i class="fa-solid fa-user-astronaut"></i> Votre Profil</h3>
                <input type="text" id="username-input" placeholder="Choisissez un pseudonyme...">
            </div>
            <div class="card">
                <h3><i class="fa-solid fa-wand-magic-sparkles"></i> Lancer une session</h3>
                <button id="create-room-btn" class="btn-block">Créer un salon privé</button>
            </div>
            <div class="card">
                <h3><i class="fa-solid fa-right-to-bracket"></i> Rejoindre un ami</h3>
                <div class="input-group">
                    <input type="text" id="room-input" placeholder="ID du salon...">
                    <button id="join-room-btn" class="btn-secondary">Rejoindre</button>
                </div>
            </div>
        </div>

        <div id="room-screen">
            <div class="room-status" id="room-display-id">Connecté</div>

            <div id="room-layout">
                <div class="left-col">
                    <div class="card">
                        <h3><i class="fa-solid fa-play-pause"></i> Lecteur Synchro (YouTube, Twitch, MP4)</h3>
                        <div class="input-group">
                            <input type="text" id="video-url-input" placeholder="Lien MP4, YouTube ou Chaîne Twitch...">
                            <button id="load-video-btn">Charger</button>
                        </div>
                        <div class="media-container" id="media-box">
                            <video id="video-player" controls></video>
                        </div>
                        
                        <div class="player-controls">
                            <div class="volume-control">
                                <i class="fa-solid fa-volume-high"></i>
                                <input type="range" id="video-volume" class="volume-slider" min="0" max="100" value="100">
                            </div>
                            <button id="sync-force-btn" class="btn-sync"><i class="fa-solid fa-rotate"></i> Forcer la synchro</button>
                        </div>
                    </div>
                </div>

                <div class="right-col">
                    <div class="card">
                        <h3><i class="fa-solid fa-video"></i> Caméras en direct</h3>
                        <button id="toggle-cam-btn" class="btn-block btn-webrtc"><i class="fa-solid fa-camera"></i> Activer ma Caméra/Micro</button>
                        <div class="video-grid" id="video-grid"></div>
                    </div>

                    <div class="card">
                        <h3><i class="fa-solid fa-comments"></i> Chat <span class="users-badge" id="user-count">0</span></h3>
                        <div class="user-list" id="users-container"></div>
                        <div class="chat-box" id="chat-messages"></div>
                        <div class="input-group">
                            <input type="text" id="chat-input" placeholder="Écrire...">
                            <button id="send-chat-btn"><i class="fa-solid fa-paper-plane"></i></button>
                        </div>
                    </div>

                    <div class="card">
                        <h3><i class="fa-solid fa-list-ol"></i> File</h3>
                        <div class="input-group">
                            <input type="text" id="playlist-url-input" placeholder="Lien à la suite...">
                            <button id="add-playlist-btn" class="btn-secondary">+</button>
                        </div>
                        <div class="playlist-box" id="playlist-container">
                            <div class="empty-playlist">Aucune vidéo</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://player.twitch.tv/js/embed/v1.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        // Dom Elements
        const authScreen = document.getElementById('auth-screen');
        const roomScreen = document.getElementById('room-screen');
        const roomDisplayId = document.getElementById('room-display-id');
        const usernameInput = document.getElementById('username-input');
        const btnCreateRoom = document.getElementById('create-room-btn');
        const roomInput = document.getElementById('room-input');
        const btnJoinRoom = document.getElementById('join-room-btn');
        const videoUrlInput = document.getElementById('video-url-input');
        const btnLoadVideo = document.getElementById('load-video-btn');
        const mediaBox = document.getElementById('media-box');
        const videoVolumeSlider = document.getElementById('video-volume');
        const btnSyncForce = document.getElementById('sync-force-btn');
        const userCount = document.getElementById('user-count');
        const usersContainer = document.getElementById('users-container');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const btnSendChat = document.getElementById('send-chat-btn');
        const playlistUrlInput = document.getElementById('playlist-url-input');
        const btnAddPlaylist = document.getElementById('add-playlist-btn');
        const playlistContainer = document.getElementById('playlist-container');
        const btnToggleCam = document.getElementById('toggle-cam-btn');
        const videoGrid = document.getElementById('video-grid');

        let currentRoomId = null;
        let isSyncing = false;
        let ytPlayer = null;
        let twitchPlayer = null;
        let ytLastState = -1;
        
        let localStream = null;
        let peerConnections = {};
        let audioContext = null;
        let analyser = null;
        let microphone = null;
        let speechInterval = null;
        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        // --- RECUPERATION DU LOCALSTORAGE ET AUTO-CONNECT ---
        const savedUsername = localStorage.getItem('streamhub_username');
        if (savedUsername) {
            usernameInput.value = savedUsername;
        } else {
            usernameInput.value = 'Invité_' + Math.floor(Math.random() * 1000);
        }

        const urlParams = new URLSearchParams(window.location.search);
        const urlRoomId = urlParams.get('room');
        
        // Si un lien de room est présent, on connecte automatiquement l'utilisateur au chargement
        if (urlRoomId) {
            setTimeout(() => {
                initializeRoom(urlRoomId);
            }, 300); 
        }

        if (btnCreateRoom) btnCreateRoom.addEventListener('click', () => initializeRoom('room-' + Math.random().toString(36).substring(2, 9)));
        if (btnJoinRoom) btnJoinRoom.addEventListener('click', () => roomInput.value.trim() && initializeRoom(roomInput.value.trim()));

        function initializeRoom(roomId) {
            currentRoomId = roomId;
            const pseudo = usernameInput.value.trim() || 'Anonyme';
            
            // On sauvegarde le pseudo choisi pour les prochaines fois
            localStorage.setItem('streamhub_username', pseudo);

            window.history.pushState({}, '', `?room=${roomId}`);
            socket.emit('join-room', { roomId, username: pseudo });
            authScreen.style.display = 'none';
            roomScreen.style.display = 'block';
            roomDisplayId.innerHTML = `Salon : <strong>${roomId}</strong>`;
        }

        // --- GESTION PAROLE & WEBRTC ---
        function startSpeechDetection(stream) {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);
                analyser.fftSize = 512;
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                let wasSpeaking = false;

                speechInterval = setInterval(() => {
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for (let i = 0; i < bufferLength; i++) { sum += dataArray[i]; }
                    let average = sum / bufferLength;
                    let isSpeaking = average > 25; 
                    if (isSpeaking !== wasSpeaking) {
                        wasSpeaking = isSpeaking;
                        const localBox = document.getElementById('local-video-box');
                        if (localBox) isSpeaking ? localBox.classList.add('speaking') : localBox.classList.remove('speaking');
                        socket.emit('audio-speaking', { isSpeaking });
                    }
                }, 150);
            } catch (e) { console.error(e); }
        }

        function stopSpeechDetection() {
            if (speechInterval) clearInterval(speechInterval);
            if (microphone) microphone.disconnect();
            if (audioContext) audioContext.close();
        }

        btnToggleCam.addEventListener('click', async () => {
            if (localStream) {
                stopSpeechDetection();
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
                const localBox = document.getElementById('local-video-box');
                if (localBox) localBox.remove();
                btnToggleCam.innerHTML = `<i class="fa-solid fa-camera"></i> Activer ma Caméra/Micro`;
                btnToggleCam.classList.replace('btn-danger', 'btn-webrtc');
                Object.keys(peerConnections).forEach(id => {
                    peerConnections[id].close(); delete peerConnections[id];
                    const remoteBox = document.getElementById(`video-${id}`);
                    if (remoteBox) remoteBox.remove();
                });
            } else {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    createVideoWrapper('local-video-box', 'Moi (Vous)', localStream, true);
                    btnToggleCam.innerHTML = `<i class="fa-solid fa-video-slash"></i> Couper ma Caméra`;
                    btnToggleCam.classList.replace('btn-webrtc', 'btn-danger');
                    startSpeechDetection(localStream);
                    socket.emit('request-peers-trigger'); 
                } catch (err) { alert("Permission refusée."); }
            }
        });

        function createVideoWrapper(id, name, stream, isMuted = false) {
            let wrapper = document.getElementById(id);
            if (!wrapper) {
                wrapper = document.createElement('div'); wrapper.id = id; wrapper.className = 'video-wrapper';
                const videoEl = document.createElement('video'); videoEl.autoplay = true; videoEl.playsInline = true;
                videoEl.muted = isMuted; videoEl.srcObject = stream;
                const label = document.createElement('div'); label.className = 'name-label'; label.innerText = name;
                wrapper.appendChild(videoEl); wrapper.appendChild(label); videoGrid.appendChild(wrapper);
            }
        }

        function initPeerConnection(userId, username, initiateCall = false) {
            if (peerConnections[userId]) return peerConnections[userId];
            const pc = new RTCPeerConnection(rtcConfig);
            peerConnections[userId] = pc;
            if (localStream) localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            pc.ontrack = (e) => createVideoWrapper(`video-${userId}`, username, e.streams[0], false);
            pc.onicecandidate = (e) => e.candidate && socket.emit('new-ice-candidate', { candidate: e.candidate, to: userId });
            if (initiateCall && localStream) {
                pc.createOffer().then(o => pc.setLocalDescription(o)).then(() => socket.emit('video-offer', { sdp: pc.localDescription, to: userId }));
            }
            return pc;
        }

        socket.on('user-joined-webrtc', ({ id, username }) => localStream && initPeerConnection(id, username, true));
        socket.on('video-offer', async ({ sdp, from }) => {
            const pc = initPeerConnection(from, 'Ami', false); await pc.setRemoteDescription(new RTCSessionDescription(sdp));
            const a = await pc.createAnswer(); await pc.setLocalDescription(a);
            socket.emit('video-answer', { sdp: pc.localDescription, to: from });
        });
        socket.on('video-answer', async ({ sdp, from }) => peerConnections[from] && await peerConnections[from].setRemoteDescription(new RTCSessionDescription(sdp)));
        socket.on('new-ice-candidate', async ({ candidate, from }) => peerConnections[from] && await peerConnections[from].addIceCandidate(new RTCIceCandidate(candidate)));
        socket.on('user-left-webrtc', ({ id }) => { if(peerConnections[id]) { peerConnections[id].close(); delete peerConnections[id]; } const el = document.getElementById(`video-${id}`); if(el) el.remove(); });
        socket.on('user-audio-speaking', ({ id, isSpeaking }) => { const rb = document.getElementById(`video-${id}`); if (rb) isSpeaking ? rb.classList.add('speaking') : rb.classList.remove('speaking'); });

        // --- SYNCHRO ET LECTEUR ---
        btnSyncForce.addEventListener('click', () => socket.emit('request-sync-force'));
        socket.on('get-current-time-for-sync', ({ requesterId }) => {
            let currentTime = 0, action = 'pause';
            if (ytPlayer && typeof ytPlayer.getCurrentTime === 'function') {
                currentTime = ytPlayer.getCurrentTime(); action = ytPlayer.getPlayerState() === 1 ? 'play' : 'pause';
            } else if (twitchPlayer) {
                currentTime = twitchPlayer.getCurrentTime(); action = 'play';
            } else {
                const vp = document.getElementById('video-player'); if (vp) { currentTime = vp.currentTime; action = vp.paused ? 'pause' : 'play'; }
            }
            socket.emit('respond-time-for-sync', { requesterId, currentTime, action });
        });

        btnLoadVideo.addEventListener('click', () => {
            const url = videoUrlInput.value.trim();
            if (url) {
                let type = 'mp4';
                if (url.includes('youtube.com') || url.includes('youtu.be')) type = 'youtube';
                else if (url.includes('twitch.tv')) type = 'twitch';
                const videoData = { type, url };
                loadMediaSource(videoData);
                socket.emit('change-video', videoData);
            }
        });

        function loadMediaSource(videoData) {
            ytPlayer = null; twitchPlayer = null;
            const { type, url } = videoData;
            if (type === 'youtube') {
                let videoId = url.includes('youtu.be/') ? url.split('youtu.be/')[1].split(/[?#]/)[0] : url.split('v=')[1].split('&')[0];
                mediaBox.innerHTML = `<div id="yt-player-placeholder"></div>`;
                ytPlayer = new YT.Player('yt-player-placeholder', {
                    videoId: videoId, playerVars: { 'autoplay': 1, 'controls': 1 },
                    events: {
                        'onStateChange': (e) => {
                            if (isSyncing) return;
                            if (e.data === 1 && ytLastState !== 1) socket.emit('video-action', { action: 'play', currentTime: ytPlayer.getCurrentTime() });
                            if (e.data === 2 && ytLastState !== 2) socket.emit('video-action', { action: 'pause', currentTime: ytPlayer.getCurrentTime() });
                            ytLastState = e.data;
                        },
                        'onReady': (e) => e.target.setVolume(videoVolumeSlider.value)
                    }
                });
            } else if (type === 'twitch') {
                let channelName = url.split('twitch.tv/')[1].split(/[?#]/)[0];
                mediaBox.innerHTML = `<div id="twitch-player"></div>`;
                twitchPlayer = new Twitch.Player("twitch-player", { channel: channelName, width: "100%", height: "100%", autoplay: true });
                twitchPlayer.setVolume(videoVolumeSlider.value / 100);
            } else {
                mediaBox.innerHTML = `<video id="video-player" controls autoplay src="${url}"></video>`;
                setTimeout(() => {
                    const vp = document.getElementById('video-player');
                    if(vp) {
                        vp.volume = videoVolumeSlider.value / 100;
                        vp.onplay = () => !isSyncing && socket.emit('video-action', { action: 'play', currentTime: vp.currentTime });
                        vp.onpause = () => !isSyncing && socket.emit('video-action', { action: 'pause', currentTime: vp.currentTime });
                    }
                }, 200);
            }
        }

        videoVolumeSlider.addEventListener('input', (e) => {
            const vol = e.target.value; const vp = document.getElementById('video-player');
            if (vp) vp.volume = vol / 100;
            if (ytPlayer && typeof ytPlayer.setVolume === 'function') ytPlayer.setVolume(vol);
            if (twitchPlayer && typeof twitchPlayer.setVolume === 'function') twitchPlayer.setVolume(vol / 100);
        });

        socket.on('user-changed-video', (videoData) => loadMediaSource(videoData));
        socket.on('user-video-action', ({ action, currentTime }) => {
            isSyncing = true;
            if (ytPlayer && typeof ytPlayer.getPlayerState === 'function') {
                if (Math.abs(ytPlayer.getCurrentTime() - currentTime) > 2) ytPlayer.seekTo(currentTime, true);
                action === 'play' ? ytPlayer.playVideo() : ytPlayer.pauseVideo();
            } else if (twitchPlayer) {
                if(action === 'play' && twitchPlayer.isPaused()) twitchPlayer.play();
            } else {
                const vp = document.getElementById('video-player');
                if (vp) { vp.currentTime = currentTime; action === 'play' ? vp.play().catch(()=>{}) : vp.pause(); }
            }
            setTimeout(() => isSyncing = false, 400);
        });

        // --- AUTRES FONCTIONS ---
        function launchFromPlaylist(url, id) {
            let type = 'mp4'; if (url.includes('youtube.com') || url.includes('youtu.be')) type = 'youtube'; else if (url.includes('twitch.tv')) type = 'twitch';
            const videoData = { type, url }; loadMediaSource(videoData); socket.emit('change-video', videoData); socket.emit('remove-from-playlist', { itemId: id });
        }
        function sendChatMessage() { const msg = chatInput.value.trim(); if (msg) { socket.emit('send-chat-message', { message: msg }); chatInput.value = ''; } }
        btnSendChat.addEventListener('click', sendChatMessage);
        chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChatMessage(); });
        btnAddPlaylist.addEventListener('click', () => { const url = playlistUrlInput.value.trim(); if (url) { socket.emit('add-to-playlist', { videoUrl: url }); playlistUrlInput.value = ''; } });
        socket.on('update-users', (list) => { userCount.innerText = list.length; usersContainer.innerHTML = ''; list.forEach(u => { usersContainer.innerHTML += `<div class="user-tag" style="border-color: ${u.color}44;"><i class="fa-solid fa-user" style="color: ${u.color};"></i> ${u.username}</div>`; }); });
        socket.on('chat-message', ({ username, message, color, isSystem }) => { if (isSystem) chatMessages.innerHTML += `<div class="chat-msg system">${message}</div>`; else chatMessages.innerHTML += `<div class="chat-msg"><span class="name" style="color: ${color};">${username}:</span>${message}</div>`; chatMessages.scrollTop = chatMessages.scrollHeight; });
        socket.on('update-playlist', (pl) => { playlistContainer.innerHTML = ''; if (pl.length === 0) { playlistContainer.innerHTML = '<div class="empty-playlist">Aucune vidéo en attente</div>'; return; } pl.forEach((item, idx) => { playlistContainer.innerHTML += `<div class="playlist-item"><span class="title-text"><strong>#${idx+1}</strong> ${item.title}</span><div class="playlist-actions"><button class="btn-success" onclick="launchFromPlaylist('${item.url}', '${item.id}')"><i class="fa-solid fa-play"></i></button><button class="btn-danger" onclick="socket.emit('remove-from-playlist', { itemId: '${item.id}' })"><i class="fa-solid fa-trash"></i></button></div></div>`; }); });
    </script>
</body>
</html>
