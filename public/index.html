<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub - Synchro Totale</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f0c1b; color: #fff; padding: 20px; text-align: center; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; margin-bottom: 20px; max-width: 800px; margin-left: auto; margin-right: auto; }
        input { padding: 10px; width: 60%; border-radius: 5px; border: none; margin-right: 10px; }
        button { padding: 10px 20px; background: #8a2be2; color: white; border: none; border-radius: 5px; cursor: pointer; }
        video { width: 100%; max-height: 450px; margin-top: 15px; background: #000; }
        audio { width: 100%; margin-top: 15px; }
        .info { font-size: 0.8rem; color: #bbb; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>StreamHub 🚀</h1>

    <div id="auth-screen" class="card">
        <h3>Rejoindre ou Créer un Salon</h3>
        <input type="text" id="room-input" placeholder="Nom du salon...">
        <button id="join-btn">Entrer</button>
    </div>

    <div id="room-screen" style="display:none;">
        <h2 id="room-title">Salon : -</h2>

        <!-- VIDÉO -->
        <div class="card">
            <h3>Lecteur Vidéo</h3>
            <input type="text" id="video-input" placeholder="Lien direct .mp4 (ex: /videos/film.mp4)">
            <button id="load-video-btn">Charger</button>
            <span class="info">NB: YouTube/Twitch se synchronisent uniquement au chargement du lien.</span>
            <div id="media-box">
                <video id="video-player" controls></video>
            </div>
        </div>

        <!-- AUDIO -->
        <div class="card">
            <h3>Lecteur Audio (Musique)</h3>
            <input type="text" id="audio-input" placeholder="Lien direct vers un fichier .mp3">
            <button id="load-audio-btn">Lancer</button>
            <span class="info">Attention : Les liens Spotify/Deezer/YouTube ne fonctionneront PAS ici. Fichiers .mp3 directs uniquement.</span>
            <audio id="audio-player" controls></audio>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentRoom = null;

        // Connexion salon
        document.getElementById('join-btn').addEventListener('click', () => {
            const room = document.getElementById('room-input').value.trim();
            if(!room) return;
            currentRoom = room;
            socket.emit('join-room', { roomId: room, username: 'User' });
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('room-screen').style.display = 'block';
            document.getElementById('room-title').innerText = "Salon actif : " + room;
        });

        // --- SECTION VIDÉO ---
        const videoInput = document.getElementById('video-input');
        const videoPlayer = document.getElementById('video-player');

        document.getElementById('load-video-btn').addEventListener('click', () => {
            const url = videoInput.value.trim();
            if(url && currentRoom) {
                setupVideoSource(url);
                socket.emit('change-video', { roomId: currentRoom, videoUrl: url });
            }
        });

        function setupVideoSource(url) {
            const box = document.getElementById('media-box');
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                let id = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('youtu.be/')[1].split(/[?#]/)[0];
                box.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allowfullscreen></iframe>`;
            } else if (url.includes('twitch.tv')) {
                let chan = url.split('twitch.tv/')[1].split(/[?#]/)[0];
                box.innerHTML = `<iframe src="https://player.twitch.tv/?channel=${chan}&parent=${window.location.hostname}&autoplay=true"></iframe>`;
            } else {
                box.innerHTML = `<video id="video-player" controls autoplay src="${url}"></video>`;
                setTimeout(attachVideoListeners, 200);
            }
        }

        function attachVideoListeners() {
            const vp = document.getElementById('video-player');
            if(!vp) return;
            
            // Événements natifs simplifiés au maximum
            vp.onplay = () => socket.emit('video-action', { roomId: currentRoom, action: 'play', currentTime: vp.currentTime });
            vp.onpause = () => socket.emit('video-action', { roomId: currentRoom, action: 'pause', currentTime: vp.currentTime });
            vp.onseeking = () => socket.emit('video-action', { roomId: currentRoom, action: 'seek', currentTime: vp.currentTime });
        }

        // --- SECTION AUDIO ---
        const audioInput = document.getElementById('audio-input');
        const audioPlayer = document.getElementById('audio-player');

        document.getElementById('load-audio-btn').addEventListener('click', () => {
            const url = audioInput.value.trim();
            if(url && currentRoom) {
                audioPlayer.src = url;
                audioPlayer.play().catch(()=>{});
                socket.emit('change-audio', { roomId: currentRoom, audioUrl: url });
            }
        });

        audioPlayer.onplay = () => socket.emit('audio-action', { roomId: currentRoom, action: 'play', currentTime: audioPlayer.currentTime });
        audioPlayer.onpause = () => socket.emit('audio-action', { roomId: currentRoom, action: 'pause', currentTime: audioPlayer.currentTime });
        audioPlayer.onseeking = () => socket.emit('audio-action', { roomId: currentRoom, action: 'seek', currentTime: audioPlayer.currentTime });


        // --- RÉCEPTION SOCKETS ---
        socket.on('user-changed-video', ({ videoUrl }) => {
            setupVideoSource(videoUrl);
        });

        socket.on('user-changed-audio', ({ audioUrl }) => {
            audioPlayer.src = audioUrl;
            audioPlayer.play().catch(()=>{});
        });

        socket.on('user-video-action', ({ action, currentTime }) => {
            const vp = document.getElementById('video-player');
            if(!vp) return;
            
            // Désactive temporairement les écouteurs pour éviter l'effet miroir/boucle
            vp.onplay = null; vp.onpause = null; vp.onseeking = null;

            vp.currentTime = currentTime;
            if (action === 'play') vp.play().catch(()=>{});
            else if (action === 'pause') vp.pause();

            // Réactive après l'action
            setTimeout(attachVideoListeners, 100);
        });

        socket.on('user-audio-action', ({ action, currentTime }) => {
            audioPlayer.onplay = null; audioPlayer.onpause = null; audioPlayer.onseeking = null;

            audioPlayer.currentTime = currentTime;
            if (action === 'play') audioPlayer.play().catch(()=>{});
            else if (action === 'pause') audioPlayer.pause();

            setTimeout(() => {
                audioPlayer.onplay = () => socket.emit('audio-action', { roomId: currentRoom, action: 'play', currentTime: audioPlayer.currentTime });
                audioPlayer.onpause = () => socket.emit('audio-action', { roomId: currentRoom, action: 'pause', currentTime: audioPlayer.currentTime });
                audioPlayer.onseeking = () => socket.emit('audio-action', { roomId: currentRoom, action: 'seek', currentTime: audioPlayer.currentTime });
            }, 100);
        });
    </script>
</body>
</html>
