<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub - Regarder Ensemble</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c1b 0%, #05050d 100%);
            --card-bg: rgba(20, 20, 35, 0.65);
            --accent-primary: #8a2be2;
            --accent-secondary: #4a00e0;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --glow: 0 0 20px rgba(138, 43, 226, 0.4);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 30px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin: 0 0 5px 0;
            background: linear-gradient(45deg, #ff007f, #8a2be2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #auth-screen {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            #auth-screen { grid-template-columns: 1fr; }
            #room-layout { grid-template-columns: 1fr !important; }
        }

        #room-screen {
            display: none;
        }

        .room-status {
            background: rgba(138, 43, 226, 0.15);
            border: 1px solid var(--accent-primary);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        /* Layout Principal 2 Colonnes */
        #room-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
            align-items: start;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            padding: 22px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 20px;
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 1.15rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h3 i { color: #ff007f; }

        .hint {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: block;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        input {
            flex: 1;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            outline: none;
            font-size: 0.9rem;
        }

        input:focus {
            border-color: var(--accent-primary);
        }

        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: var(--glow);
        }

        .btn-block { width: 100%; }
        .btn-secondary { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-danger { background: linear-gradient(135deg, #ff0055 0%, #990033 100%); }

        .media-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 10px;
        }

        video, iframe, #yt-player-placeholder {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            background: rgba(255, 255, 255, 0.04);
            padding: 6px 14px;
            border-radius: 8px;
            width: fit-content;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 110px;
            height: 4px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-primary);
        }

        /* Zone de Discussion & Utilisateurs */
        .users-badge {
            background: #00f2fe;
            color: #000;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
        }

        .user-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 15px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            max-height: 70px;
            overflow-y: auto;
        }

        .user-tag {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .user-tag i { color: #00f2fe; font-size: 0.7rem;}

        .chat-box {
            height: 250px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 10px;
            padding: 12px;
            overflow-y: auto;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-msg {
            font-size: 0.85rem;
            line-height: 1.3;
            word-break: break-word;
        }
        .chat-msg .name {
            font-weight: 700;
            color: #ff007f;
            margin-right: 5px;
        }
        .chat-msg.system {
            color: var(--text-muted);
            font-style: italic;
            text-align: center;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.02);
            padding: 3px;
            border-radius: 4px;
        }

        /* Playlist / File d'attente */
        .playlist-box {
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 10px;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.04);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            border-left: 3px solid var(--accent-primary);
        }

        .playlist-item span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 220px;
        }

        .playlist-item button {
            padding: 4px 8px;
            font-size: 0.75rem;
        }

        .empty-playlist {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-style: italic;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>StreamHub</h1>
            <p>Salons synchronisés en temps réel.</p>
        </header>
        
        <!-- ÉCRAN D'AUTHENTIFICATION -->
        <div id="auth-screen">
            <div class="card" style="grid-column: 1 / -1; margin-bottom: 10px;">
                <h3><i class="fa-solid fa-user-astronaut"></i> Votre Profil</h3>
                <input type="text" id="username-input" placeholder="Choisissez un pseudonyme..." value="Invité">
            </div>
            <div class="card">
                <h3><i class="fa-solid fa-wand-magic-sparkles"></i> Lancer une session</h3>
                <button id="create-room-btn" class="btn-block">Créer un salon privé</button>
            </div>
            <div class="card">
                <h3><i class="fa-solid fa-right-to-bracket"></i> Rejoindre un ami</h3>
                <div class="input-group">
                    <input type="text" id="room-input" placeholder="ID du salon...">
                    <button id="join-room-btn" class="btn-secondary">Rejoindre</button>
                </div>
            </div>
        </div>

        <!-- ÉCRAN DU SALON DE LECTURE -->
        <div id="room-screen">
            <div class="room-status" id="room-display-id">Connecté</div>

            <div id="room-layout">
                <!-- COLONNE GAUCHE : LECTEUR VIDÉO -->
                <div class="left-col">
                    <div class="card">
                        <h3><i class="fa-solid fa-play-pause"></i> Lecteur Vidéo Synchro</h3>
                        <span class="hint"><i class="fa-brands fa-youtube"></i> YouTube Live Synchro | <i class="fa-solid fa-file-video"></i> Fichier MP4</span>
                        <div class="input-group">
                            <input type="text" id="video-url-input" placeholder="Lien MP4 ou URL YouTube...">
                            <button id="load-video-btn">Charger immédiatement</button>
                        </div>
                        <div class="media-container" id="media-box">
                            <video id="video-player" controls></video>
                        </div>
                        <div class="volume-control">
                            <i class="fa-solid fa-volume-high"></i>
                            <input type="range" id="video-volume" class="volume-slider" min="0" max="100" value="100">
                        </div>
                    </div>
                </div>

                <!-- COLONNE DROITE : USERS, CHAT, PLAYLIST -->
                <div class="right-col">
                    <!-- MEMBRES & DISCUSSION -->
                    <div class="card">
                        <h3>
                            <i class="fa-solid fa-comments"></i> Salon & Chat 
                            <span class="users-badge" id="user-count">0</span>
                        </h3>
                        
                        <!-- Liste des utilisateurs (Amélioration 3) -->
                        <div class="user-list" id="users-container"></div>

                        <!-- Chat Textuel (Amélioration 1) -->
                        <div class="chat-box" id="chat-messages"></div>
                        <div class="input-group">
                            <input type="text" id="chat-input" placeholder="Écrire un message...">
                            <button id="send-chat-btn"><i class="fa-solid fa-paper-plane"></i></button>
                        </div>
                    </div>

                    <!-- PLAYLIST / FILE D'ATTENTE (Amélioration 2) -->
                    <div class="card">
                        <h3><i class="fa-solid fa-list-ol"></i> File d'attente</h3>
                        <div class="input-group">
                            <input type="text" id="playlist-url-input" placeholder="Lien à ajouter à la suite...">
                            <button id="add-playlist-btn" class="btn-secondary">+</button>
                        </div>
                        <div class="playlist-box" id="playlist-container">
                            <div class="empty-playlist">Aucune vidéo en attente</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        // Sélecteurs d'éléments
        const authScreen = document.getElementById('auth-screen');
        const roomScreen = document.getElementById('room-screen');
        const roomDisplayId = document.getElementById('room-display-id');
        const usernameInput = document.getElementById('username-input');
        const btnCreateRoom = document.getElementById('create-room-btn');
        const roomInput = document.getElementById('room-input');
        const btnJoinRoom = document.getElementById('join-room-btn');
        const videoUrlInput = document.getElementById('video-url-input');
        const btnLoadVideo = document.getElementById('load-video-btn');
        const mediaBox = document.getElementById('media-box');
        const videoVolumeSlider = document.getElementById('video-volume');
        
        // Sélecteurs Nouveautés
        const userCount = document.getElementById('user-count');
        const usersContainer = document.getElementById('users-container');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const btnSendChat = document.getElementById('send-chat-btn');
        const playlistUrlInput = document.getElementById('playlist-url-input');
        const btnAddPlaylist = document.getElementById('add-playlist-btn');
        const playlistContainer = document.getElementById('playlist-container');

        let currentRoomId = null;
        let isSyncing = false;
        let ytPlayer = null;
        let ytLastState = -1;
        let activePlaylist = [];

        // Gestion URL Directe
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('room')) {
            initializeRoom(urlParams.get('room'));
        }

        if (btnCreateRoom) btnCreateRoom.addEventListener('click', () => initializeRoom('room-' + Math.random().toString(36).substring(2, 9)));
        if (btnJoinRoom) btnJoinRoom.addEventListener('click', () => roomInput.value.trim() && initializeRoom(roomInput.value.trim()));

        function initializeRoom(roomId) {
            currentRoomId = roomId;
            const pseudo = usernameInput.value.trim() || 'Invité';
            window.history.pushState({}, '', `?room=${roomId}`);
            
            socket.emit('join-room', { roomId, username: pseudo });
            
            authScreen.style.display = 'none';
            roomScreen.style.display = 'block';
            roomDisplayId.innerHTML = `<i class="fa-solid fa-circle-check"></i> Salon : <strong>${roomId}</strong>`;
        }

        // --- GESTION DU VOLUMES ---
        videoVolumeSlider.addEventListener('input', (e) => {
            const vp = document.getElementById('video-player');
            if (vp) vp.volume = e.target.value / 100;
            if (ytPlayer && typeof ytPlayer.setVolume === 'function') ytPlayer.setVolume(e.target.value);
        });

        // --- ENVOI DES ACTIONS MÉDIAS ---
        if (btnLoadVideo) {
            btnLoadVideo.addEventListener('click', () => {
                const url = videoUrlInput.value.trim();
                if (url && currentRoomId) {
                    loadMediaSource(url);
                    socket.emit('change-video', { roomId: currentRoomId, videoUrl: url });
                }
            });
        }

        function loadMediaSource(url) {
            ytPlayer = null;
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                let videoId = url.includes('youtu.be/') ? url.split('youtu.be/')[1].split(/[?#]/)[0] : url.split('v=')[1].split('&')[0];
                mediaBox.innerHTML = `<div id="yt-player-placeholder"></div>`;
                ytPlayer = new YT.Player('yt-player-placeholder', {
                    videoId: videoId,
                    playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0 },
                    events: {
                        'onStateChange': (e) => {
                            if (isSyncing) return;
                            if (e.data === 1 && ytLastState !== 1) socket.emit('video-action', { roomId: currentRoomId, action: 'play', currentTime: ytPlayer.getCurrentTime() });
                            if (e.data === 2 && ytLastState !== 2) socket.emit('video-action', { roomId: currentRoomId, action: 'pause', currentTime: ytPlayer.getCurrentTime() });
                            ytLastState = e.data;
                        },
                        'onReady': (e) => e.target.setVolume(videoVolumeSlider.value)
                    }
                });
            } else {
                mediaBox.innerHTML = `<video id="video-player" controls autoplay src="${url}"></video>`;
                setTimeout(() => {
                    const vp = document.getElementById('video-player');
                    if(vp) {
                        vp.volume = videoVolumeSlider.value / 100;
                        vp.onplay = () => !isSyncing && socket.emit('video-action', { roomId: currentRoomId, action: 'play', currentTime: vp.currentTime });
                        vp.onpause = () => !isSyncing && socket.emit('video-action', { roomId: currentRoomId, action: 'pause', currentTime: vp.currentTime });
                        
                        // Quand la vidéo MP4 se termine, lancer la suite de la playlist
                        vp.onended = () => playNextInPlaylist();
                    }
                }, 200);
            }
        }

        // --- AMÉLIORATION 1 : ENVOI DISCUSSION CHAT ---
        function sendChatMessage() {
            const msg = chatInput.value.trim();
            if (msg) {
                socket.emit('send-chat-message', { message: msg });
                chatInput.value = '';
            }
        }
        btnSendChat.addEventListener('click', sendChatMessage);
        chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChatMessage(); });

        // --- AMÉLIORATION 2 : GESTION PLAYLIST ---
        btnAddPlaylist.addEventListener('click', () => {
            const url = playlistUrlInput.value.trim();
            if (url) {
                socket.emit('add-to-playlist', { videoUrl: url });
                playlistUrlInput.value = '';
            }
        });

        function playNextInPlaylist() {
            if (activePlaylist.length > 0) {
                const nextVideo = activePlaylist[0];
                loadMediaSource(nextVideo.url);
                socket.emit('change-video', { roomId: currentRoomId, videoUrl: nextVideo.url });
                socket.emit('remove-from-playlist', { itemId: nextVideo.id });
            }
        }

        // --- RECEPTION SOCKETS / MISES À JOUR ---

        // Mise à jour de la liste des membres (Amélioration 3)
        socket.on('update-users', (usersList) => {
            userCount.innerText = usersList.length;
            usersContainer.innerHTML = '';
            usersList.forEach(user => {
                usersContainer.innerHTML += `<div class="user-tag"><i class="fa-solid fa-user"></i> ${user}</div>`;
            });
        });

        // Distribution des messages du Chat (Amélioration 1)
        socket.on('chat-message', ({ username, message, isSystem }) => {
            if (isSystem) {
                chatMessages.innerHTML += `<div class="chat-msg system">${message}</div>`;
            } else {
                chatMessages.innerHTML += `<div class="chat-msg"><span class="name">${username}:</span>${message}</div>`;
            }
            chatMessages.scrollTop = chatMessages.scrollHeight; // Auto scroll vers le bas
        });

        // Mise à jour visuelle de la playlist (Amélioration 2)
        socket.on('update-playlist', (playlist) => {
            activePlaylist = playlist;
            playlistContainer.innerHTML = '';
            if (playlist.length === 0) {
                playlistContainer.innerHTML = '<div class="empty-playlist">Aucune vidéo en attente</div>';
                return;
            }
            playlist.forEach((item, index) => {
                playlistContainer.innerHTML += `
                    <div class="playlist-item">
                        <span><strong>#${index+1}</strong> ${item.title}</span>
                        <button class="btn-danger" onclick="socket.emit('remove-from-playlist', { itemId: '${item.id}' })"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
            });
        });

        // Synchro commandes vidéo classiques
        socket.on('user-changed-video', ({ videoUrl }) => loadMediaSource(videoUrl));
        socket.on('user-video-action', ({ action, currentTime }) => {
            isSyncing = true;
            if (ytPlayer && typeof ytPlayer.getPlayerState === 'function') {
                if (Math.abs(ytPlayer.getCurrentTime() - currentTime) > 2) ytPlayer.seekTo(currentTime, true);
                action === 'play' ? ytPlayer.playVideo() : ytPlayer.pauseVideo();
            } else {
                const vp = document.getElementById('video-player');
                if (vp) { 
                    vp.currentTime = currentTime; 
                    action === 'play' ? vp.play().catch(()=>{}) : vp.pause(); 
                }
            }
            setTimeout(() => isSyncing = false, 300);
        });
    </script>
</body>
</html>
